name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    name: Lint, Test, Build
    runs-on: ubuntu-latest
    env:
      AUTH_SECRET: ci-auth-secret-at-least-32-characters
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://documind:documind@localhost:5432/documind?schema=public
      NEXT_PUBLIC_APP_NAME: DocuMind
      OPENAI_ANSWER_MODEL: gpt-5-mini
      OPENAI_API_KEY: test-key-not-used-by-unit-tests
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
