services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: documind-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-local-docker-auth-secret-at-least-32-characters}
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://documind:documind@postgres:5432/documind?schema=public
      NEXT_PUBLIC_APP_NAME: DocuMind
      OPENAI_ANSWER_MODEL: ${OPENAI_ANSWER_MODEL:-gpt-5-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "3000:3000"
    volumes:
      - uploads-data:/app/uploads
    command: sh -c "npx prisma migrate deploy && npm run start"

  postgres:
    image: pgvector/pgvector:pg16
    container_name: documind-postgres
    environment:
      POSTGRES_USER: documind
      POSTGRES_PASSWORD: documind
      POSTGRES_DB: documind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documind -d documind"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  uploads-data:
